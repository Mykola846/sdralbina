<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR-коды для печати · Квест</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0; padding: 24px; color: #2b2b2b; background: #f6f6f8;
    }
    .head {
      max-width: 900px; margin: 0 auto 18px; text-align: center;
    }
    .head h1 { margin: 0 0 6px; font-size: 24px; }
    .head p { margin: 4px 0; color: #666; font-size: 14px; }
    .base {
      display: inline-block; margin-top: 6px; padding: 6px 12px;
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      font-family: ui-monospace, Menlo, monospace; font-size: 13px;
      word-break: break-all;
    }
    .btn {
      margin-top: 14px; cursor: pointer; border: 0; border-radius: 999px;
      background: #ff5e7e; color: #fff; font-weight: 700; font-size: 15px;
      padding: 10px 22px;
    }
    .warn {
      max-width: 900px; margin: 0 auto 18px; padding: 12px 16px;
      background: #fff4d6; border: 1px solid #ffd23f; border-radius: 10px;
      font-size: 14px; color: #6b5a00; display: none;
    }
    .grid {
      max-width: 900px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }
    .qr-card {
      background: #fff; border: 1px solid #e3e3e8; border-radius: 14px;
      padding: 18px 14px; text-align: center; break-inside: avoid;
    }
    .qr-card .label { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .qr-card .sub { font-size: 13px; color: #888; margin-bottom: 12px; }
    .qr-card .qrbox { display: flex; justify-content: center; }
    .qr-card .qrbox img, .qr-card .qrbox canvas { width: 180px !important; height: 180px !important; }
    .qr-card .url {
      margin-top: 10px; font-family: ui-monospace, Menlo, monospace;
      font-size: 11px; color: #aaa; word-break: break-all;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .head .btn, .warn { display: none !important; }
      .qr-card { border-color: #ccc; }
    }
  </style>
</head>
<body>
  <div class="head">
    <h1>QR-коды квеста 🎉</h1>
    <p>Распечатай эту страницу, вырежи коды и спрячь по этажам.<br>
       «Старт» отдай имениннику или повесь на дверь.</p>
    <button class="btn" onclick="window.print()">🖨 Печать</button>
  </div>

  <div class="grid" id="grid"></div>

  <script src="config.js?v=13"></script>
  <script src="lib/qrcode.min.js"></script>
  <script>
    (function () {
      // базовый адрес = текущий URL без qr.html, ?, #
      var base = location.href.split("#")[0].split("?")[0].replace(/qr\.html$/i, "");
      if (!/\/$/.test(base)) base += "/";

      var items = [{ label: "Старт", sub: "отдать имениннику", url: base }];
      QUEST.floors.forEach(function (f, i) {
        items.push({
          label: f.floor,
          sub: "уровень " + (i + 1),
          url: base + "#" + (i + 1),
        });
      });

      var grid = document.getElementById("grid");
      items.forEach(function (it) {
        var card = document.createElement("div");
        card.className = "qr-card";
        card.innerHTML =
          '<div class="label">' + it.label + "</div>" +
          '<div class="sub">' + it.sub + "</div>" +
          '<div class="qrbox"></div>' +
          '<div class="url">' + it.url + "</div>";
        grid.appendChild(card);
        new QRCode(card.querySelector(".qrbox"), {
          text: it.url,
          width: 180,
          height: 180,
          correctLevel: QRCode.CorrectLevel.M,
        });
      });
    })();
  </script>
</body>
</html>
